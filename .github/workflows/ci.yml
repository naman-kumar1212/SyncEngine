name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: naman
          POSTGRES_PASSWORD: ncbh1234
          POSTGRES_DB: syncepass
        ports: ['5433:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run schema migration
        run: npx ts-node src/server/persistence/migrations.ts
        env:
          DATABASE_URL: postgresql://naman:ncbh1234@localhost:5433/syncepass
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-123
          NODE_ENV: test

      - name: Run unit tests
        run: npm run test:unit -- --reporter=verbose

      - name: Run integration tests
        run: npm run test:integration -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://naman:ncbh1234@localhost:5433/syncepass
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-123
          NODE_ENV: test

      - name: Run E2E tests
        run: npm run test:e2e -- --reporter=verbose

      - name: Coverage report
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: true
          tags: |
            ghcr.io/naman-kumar1212/synce-engine:latest
            ghcr.io/naman-kumar1212/synce-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
