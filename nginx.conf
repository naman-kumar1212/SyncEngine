events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    upstream sync_servers {
        server server:3000;
    }

    server {
        listen       80;
        server_name  localhost;

        # Redirect all HTTP traffic to HTTPS (disabled for local dev ease, but standard)
        # listen 443 ssl;
        # ...

        # HTTP REST API routing
        location /api/ {
            proxy_pass http://sync_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket real-time connection routing
        location /ws {
            proxy_pass http://sync_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts for WebSockets (keep connection alive)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Healthcheck endpoint proxy
        location /health {
            proxy_pass http://sync_servers/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Default static file serving (placeholder or fallback)
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}
